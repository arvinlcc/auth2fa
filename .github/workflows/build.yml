name: Build
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
            artifact-name: 'macos-universal'
          - platform: 'ubuntu-latest'
            args: ''
            artifact-name: 'linux-x86_64'
          - platform: 'windows-latest'
            args: ''
            artifact-name: 'windows-x86_64'
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Delete existing artifact if exists
        uses: actions/github-script@v7
        with:
          script: |
            const artifactName = '${{ matrix.artifact-name }}';
            try {
              const { data: { artifacts } } = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: ${{ github.run_id }},
              });
              for (const a of artifacts.filter(a => a.name === artifactName)) {
                console.log(`Deleting: ${a.name} (${a.id})`);
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: a.id,
                });
              }
            } catch (e) {
              console.log('Nothing to delete:', e.message);
            }

      - name: Build and upload artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          args: ${{ matrix.args }}
          uploadWorkflowArtifacts: true                          # ✅ 正确参数名
          workflowArtifactNamePattern: ${{ matrix.artifact-name }}  # ✅ 固定名称，避免冲突