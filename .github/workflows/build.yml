name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
            artifact_name: 'macos-universal'
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            artifact_name: 'macos-aarch64'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            artifact_name: 'macos-x86_64'
          - platform: 'ubuntu-latest'
            args: ''
            artifact_name: 'linux'
          - platform: 'windows-latest'
            args: ''
            artifact_name: 'windows'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Set target triple
        id: target
        run: |
          if [ "${{ matrix.args }}" == "--target universal-apple-darwin" ]; then
            echo "value=universal-apple-darwin" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.args }}" == "--target aarch64-apple-darwin" ]; then
            echo "value=aarch64-apple-darwin" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.args }}" == "--target x86_64-apple-darwin" ]; then
            echo "value=x86_64-apple-darwin" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.platform }}" == "ubuntu-latest" ]; then
            echo "value=release" >> $GITHUB_OUTPUT
          else
            echo "value=release" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Build application
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/${{ steps.target.outputs.value }}/bundle/**/*
            src-tauri/target/release/bundle/**/*
          retention-days: 30
          if-no-files-found: warn
