name: Release

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: 'Build workflow run ID'
        required: true
        type: string
      tag:
        description: 'Tag name to release'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          # 修复：如果你是从另一个 workflow 下载，需要此 token
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.build_run_id }}

      - name: Display structure of downloaded files
        run: ls -R ./artifacts

      - name: Create Release
        # 修复：更新到 v2
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: '2FA Authenticator ${{ inputs.tag }}'
          draft: false
          prerelease: false
          generate_release_notes: true
          # 修复：使用更宽泛的匹配模式，确保能抓到各种格式安装包
          files: |
            ./artifacts/**/*.deb
            ./artifacts/**/*.appimage
            ./artifacts/**/*.msi
            ./artifacts/**/*.exe
            ./artifacts/**/*.dmg
            ./artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}