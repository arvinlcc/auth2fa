# release.yml
name: Release
on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: 'Build workflow run ID (from Actions page URL)'
        required: true
        type: string
      tag:
        description: 'Tag name to release (e.g., v1.0.8)'
        required: true
        type: string
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      # ✅ 清理目标 release 下所有旧的同名 asset（避免重复发布冲突）
      - name: Delete existing release assets if any
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ inputs.tag }}';
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              for (const asset of release.assets) {
                console.log(`Deleting asset: ${asset.name}`);
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id,
                });
              }
            } catch (e) {
              console.log('No existing release or assets to delete:', e.message);
            }

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.build_run_id }}

      - name: Display structure of downloaded files
        run: ls -R ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: '2FA Authenticator ${{ inputs.tag }}'
          draft: false
          generate_release_notes: true
          files: |
            ./artifacts/macos-universal/**/*
            ./artifacts/linux-x86_64/**/*
            ./artifacts/windows-x86_64/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}